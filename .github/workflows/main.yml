name: Generate Operation Data

on:
  schedule:
    # GitHub ActionsのcronはUTC基準
    # 日本時間 0:00  → UTC 15:00
    # 日本時間 6:00  → UTC 21:00
    # 日本時間 12:00 → UTC 3:00
    # 日本時間 18:00 → UTC 9:00
    - cron: "0 3,9,15,21 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Packages
        run: |
          pip install -r requirements.txt

      - name: Generate CSV
        run: |
          python generate_dummy_data.py

      - name: Commit CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/

          git diff --cached --quiet || git commit -m "Auto update operation data"

          git push
